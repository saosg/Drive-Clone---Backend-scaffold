apiVersion: apps/v1
kind: Deployment
metadata:
  name: drive-clone-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drive-clone
  template:
    metadata:
      labels:
        app: drive-clone
    spec:
      containers:
        - name: app
          image: drive-clone:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@db:5432/drive"
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"

---
apiVersion: v1
kind: Service
metadata:
  name: drive-clone-service
spec:
  selector:
    app: drive-clone
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
