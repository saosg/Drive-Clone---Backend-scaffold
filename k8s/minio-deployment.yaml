apiVersion: apps/v1
kind: Deployment
metadata:
  name: drive-clone-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drive-clone-minio
  template:
    metadata:
      labels:
        app: drive-clone-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
            - containerPort: 9001

---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector:
    app: drive-clone-minio
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
